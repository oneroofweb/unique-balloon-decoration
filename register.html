<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register | Event Bucket</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background-color: #fff;
      }
      .theme-red { color: #25A25A; }
      
      .btn-theme {
        background-color: #25A25A;
        color: white;
        font-weight: 600;
        border: none;
        transition: all 0.3s;
      }
      .btn-theme:hover {
        background-color: #1b7a43;
        color: white;
        transform: translateY(-2px);
      }
      
      /* Wrapper keeps minimum height of screen but expands if content is long on mobile */
      .auth-wrapper {
        min-height: 100vh;
        width: 100%;
      }
      
      /* Video Section Background */
      .auth-video-side {
        background: linear-gradient(135deg, #25A25A 0%, #176335 100%);
      }

      .form-control:focus {
        border-color: #25A25A;
        box-shadow: 0 0 0 0.2rem rgba(37, 162, 90, 0.25);
      }
      
      /* Form Label Tweaks */
      .form-label {
        margin-bottom: 0.3rem;
      }
    </style>
  </head>
  <body>

    <div class="row g-0 auth-wrapper">
      
      <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white order-1">
        <div class="w-100 p-4 p-md-5" style="max-width: 550px;">
          
          <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none">
              <img src="images/unique_baloon_logo.png" alt="Event Bucket Logo" style="width: 200px; max-width: 100%;">
            </a>
            <p class="text-muted mt-3 mb-0">Create an account to get started</p>
          </div>

          <form>
            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                <label class="form-label small fw-bold text-muted">Full Name</label>
                <input type="text" class="form-control bg-light py-2" placeholder="John Doe" required>
              </div>
              <div class="col-sm-6">
                <label class="form-label small fw-bold text-muted">Phone Number</label>
                <input type="tel" class="form-control bg-light py-2" placeholder="+91 987..." required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Email Address</label>
              <input type="email" class="form-control bg-light py-2" placeholder="name@example.com" required>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                <label class="form-label small fw-bold text-muted">Password</label>
                <input type="password" class="form-control bg-light py-2" placeholder="******" required>
              </div>
              <div class="col-sm-6">
                <label class="form-label small fw-bold text-muted">Confirm Password</label>
                <input type="password" class="form-control bg-light py-2" placeholder="******" required>
              </div>
            </div>

            <div class="form-check mb-4">
              <input type="checkbox" class="form-check-input" id="terms" required>
              <label class="form-check-label small text-muted" for="terms">
                I agree to the <a href="#" class="theme-red text-decoration-none">Terms of Service</a> & <a href="#" class="theme-red text-decoration-none">Privacy Policy</a>
              </label>
            </div>

            <button type="submit" class="btn btn-theme w-100 py-3 rounded-pill shadow-sm fs-6">Create Account</button>
          </form>

          <p class="text-center mt-4 text-muted small">
            Already have an account? <a href="login.html" class="theme-red fw-bold text-decoration-none">Sign In</a>
          </p>

        </div>
      </div>

      <div class="col-lg-6 auth-video-side d-flex flex-column align-items-center justify-content-center p-4 p-md-5 order-2">
        <div class="w-100 text-center text-white" style="max-width: 550px;">
          
          <h2 class="fw-bold fs-1 mb-2">How to Register?</h2>
          <p class="opacity-75 mb-4 fs-6">Watch this quick video tutorial to learn how to set up your account in just 2 minutes.</p>
          
          <div class="ratio ratio-16x9 shadow-lg rounded-4 overflow-hidden border border-white border-opacity-25 bg-dark mb-4">
            
            <iframe width="560" height="315" src="https://www.youtube.com/embed/ozbyH7YXLTM?si=4uR2yLNSbLV2Cxem" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
          </div>

          <div class="opacity-75 small d-flex justify-content-center flex-wrap gap-3">
            <span><i class="fa-solid fa-circle-check me-1"></i> Quick & Easy Process</span>
            <span class="d-none d-sm-inline">|</span>
            <span><i class="fa-solid fa-shield-halved me-1"></i> 100% Secure</span>
          </div>

        </div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
