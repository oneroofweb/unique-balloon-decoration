<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register | Unique Balloons Decoration</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background-color: #fff;
      }
      .theme-red { color: #25A25A; }
      
      .btn-theme {
        background-color: #25A25A;
        color: white;
        font-weight: 600;
        border: none;
        transition: all 0.3s;
      }
      .btn-theme:hover {
        background-color: #1b7a43;
        color: white;
        transform: translateY(-2px);
      }
      
      /* Wrapper keeps minimum height of screen but expands if content is long on mobile */
      .auth-wrapper {
        min-height: 100vh;
        width: 100%;
      }
      
      /* Video Section Background */
      .auth-video-side {
        background: linear-gradient(135deg, #25A25A 0%, #176335 100%);
      }

      .form-control:focus {
        border-color: #25A25A;
        box-shadow: 0 0 0 0.2rem rgba(37, 162, 90, 0.25);
      }
      
      /* Form Label Tweaks */
      .form-label {
        margin-bottom: 0.3rem;
      }

      /* OTP Box Styling */
      .otp-box {
        width: 55px;
        height: 55px;
        text-align: center;
        font-size: 24px;
        font-weight: 600;
        border-radius: 10px;
      }
      .otp-box:focus {
        border-color: #25A25A;
        box-shadow: 0 0 0 0.25rem rgba(37, 162, 90, 0.15);
      }
      
      /* Back to home button positioning */
      .top-nav-bar {
        position: absolute;
        top: 20px;
        width: 100%;
        max-width: 550px;
        padding: 0 20px;
        display: flex;
        justify-content: flex-start;
        z-index: 10;
      }
    </style>
  </head>
  <body>

    <div class="row g-0 auth-wrapper position-relative">
      
      <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white order-1 position-relative">
        
        <div class="top-nav-bar">
          <a href="index.html" class="btn btn-outline-secondary btn-sm fw-medium shadow-sm rounded-pill px-3">
            <i class="fa-solid fa-arrow-left me-1"></i> Back to Home
          </a>
        </div>

        <div class="w-100 p-4 p-md-5 mt-4 mt-md-0" style="max-width: 550px;">
          
          <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none">
              <img src="images/unique_baloon_logo.png" alt="Event Bucket Logo" style="width: 200px; max-width: 100%;">
            </a>
            <p class="text-muted mt-3 mb-0">Create an account to get started</p>
          </div>

          <form id="registerForm">
            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                <label class="form-label small fw-bold text-muted">Full Name</label>
                <input type="text" class="form-control bg-light py-2" placeholder="John Doe" required>
              </div>
              <div class="col-sm-6">
                <label class="form-label small fw-bold text-muted">Phone Number</label>
                <input type="tel" class="form-control bg-light py-2" placeholder="+91 987..." required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Email Address</label>
              <input type="email" class="form-control bg-light py-2" id="email" placeholder="name@example.com" required>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                <label class="form-label small fw-bold text-muted">Password</label>
                <input type="password" class="form-control bg-light py-2" placeholder="******" required>
              </div>
              <div class="col-sm-6">
                <label class="form-label small fw-bold text-muted">Confirm Password</label>
                <input type="password" class="form-control bg-light py-2" placeholder="******" required>
              </div>
            </div>

            <div class="form-check mb-4">
              <input type="checkbox" class="form-check-input" id="terms" required>
              <label class="form-check-label small text-muted" for="terms">
                I agree to the <a href="#" class="theme-red text-decoration-none">Terms of Service</a> & <a href="#" class="theme-red text-decoration-none">Privacy Policy</a>
              </label>
            </div>

            <button type="submit" class="btn btn-theme w-100 py-3 rounded-pill shadow-sm fs-6">Create Account</button>
          </form>

          <p class="text-center mt-4 text-muted small">
            Already have an account? <a href="login.html" class="theme-red fw-bold text-decoration-none">Sign In</a>
          </p>

        </div>
      </div>

      <div class="col-lg-6 auth-video-side d-flex flex-column align-items-center justify-content-center p-4 p-md-5 order-2">
        <div class="w-100 text-center text-white" style="max-width: 550px;">
          
          <h2 class="fw-bold fs-1 mb-2">How to Register?</h2>
          <p class="opacity-75 mb-4 fs-6">Watch this quick video tutorial to learn how to set up your account in just 2 minutes.</p>
          
          <div class="ratio ratio-16x9 shadow-lg rounded-4 overflow-hidden border border-white border-opacity-25 bg-dark mb-4">
            
            <iframe width="560" height="315" src="https://www.youtube.com/embed/ozbyH7YXLTM?si=4uR2yLNSbLV2Cxem" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
          </div>

          <div class="opacity-75 small d-flex justify-content-center flex-wrap gap-3">
            <span><i class="fa-solid fa-circle-check me-1"></i> Quick & Easy Process</span>
            <span class="d-none d-sm-inline">|</span>
            <span><i class="fa-solid fa-shield-halved me-1"></i> 100% Secure</span>
          </div>

        </div>
      </div>

    </div>

    <div class="modal fade" id="otpModal" tabindex="-1" aria-labelledby="otpModalLabel" aria-hidden="true" data-bs-backdrop="static">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg rounded-4">
          <div class="modal-header border-0 pb-0 justify-content-center position-relative">
            <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
            <div class="text-center mt-3">
              <div class="bg-success bg-opacity-10 text-success rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                <i class="fa-solid fa-envelope-open-text fs-3"></i>
              </div>
              <h4 class="modal-title fw-bold text-dark" id="otpModalLabel">Verify Email</h4>
              <p class="text-muted small mb-0 mt-2">We've sent a 4-digit code to<br>
                <strong id="displayEmail" class="text-dark"></strong>
              </p>
            </div>
          </div>
          <div class="modal-body px-4 pb-4 pt-3">
            
            <form id="otpForm">
              <div class="d-flex justify-content-between gap-2 mb-4 otp-container">
                <input type="text" class="form-control bg-light otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" class="form-control bg-light otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric" required disabled>
                <input type="text" class="form-control bg-light otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric" required disabled>
                <input type="text" class="form-control bg-light otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric" required disabled>
              </div>
              
              <button type="button" class="btn btn-theme w-100 rounded-pill mb-3" id="verifyOtpBtn">
                Verify & Submit <i class="fa-solid fa-check ms-1"></i>
              </button>
              
              <div class="text-center">
                <span class="text-muted small">Didn't receive code? </span>
                <a href="javascript:void(0)" class="theme-red text-decoration-none fw-bold small">Resend OTP</a>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        
        const registerForm = document.getElementById('registerForm');
        const otpModal = new bootstrap.Modal(document.getElementById('otpModal'));
        const emailInput = document.getElementById('email');
        const displayEmail = document.getElementById('displayEmail');
        
        const otpInputs = document.querySelectorAll('.otp-box');

        // 1. Show Modal on Form Submit
        registerForm.addEventListener('submit', function(e) {
          e.preventDefault(); 
          
          if(registerForm.checkValidity()) {
            // Email dikhao modal ke andar
            displayEmail.innerText = emailInput.value;
            // Modal kholo
            otpModal.show();
            
            // Thoda timeout dekar pehle box pe focus karo
            setTimeout(() => {
              otpInputs[0].focus();
            }, 500);
          } else {
            registerForm.reportValidity();
          }
        });

        // 2. OTP Auto-Focus Magic
        otpInputs.forEach((input, index) => {
          input.addEventListener('keyup', function(e) {
            
            const currentInput = input;
            const nextInput = input.nextElementSibling;
            const prevInput = input.previousElementSibling;

            // Agar user ne number type kiya toh aage badho
            if (currentInput.value.length > 0) {
              if (nextInput) {
                nextInput.removeAttribute("disabled");
                nextInput.focus();
              }
            }

            // Agar user ne backspace (delete) dabaya toh piche aao
            if (e.key === "Backspace") {
              currentInput.value = "";
              if (prevInput) {
                prevInput.focus();
              }
            }
          });
        });

      });
    </script>
  </body>
</html>
